
<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>



<style>

body{
    
    font-family: Arial;
    background:yellow;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculator{
    background:black;
    padding:20px;
    border-radius:12px;
    width:300px;
}

#display{
    width:100%;
    height:60px;
    font-size:22px;
    margin-bottom:15px;
    text-align:right;
    padding:10px;
    border:none;
    border-radius:6px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

button{
    height:55px;
    font-size:18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#d9d9d9;
}

button:hover{
    opacity:0.9;
}

.operator{
    background:#ff9800;
    color:white;
}

.display{
    background:#f5f5f5;
    margin-left: -10px;
}
.clear{
    background:#e53935;
    color:white;
}

.equal{
    background:#28a745;
    color:white;
    grid-column: span 2;
}

</style>

</head>

<body>

<div class="calculator">

<input type="text" id="display" class="display"  placeholder="0">

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="delete" onclick="deleteLast()">DEL</button>
<button class="operator" onclick="appendValue('/')">/</button>
<button class="operator" onclick="appendValue('*')">*</button>

<button class="number" onclick="appendValue('7')">7</button>
<button class="number" onclick="appendValue('8')">8</button>
<button onclick="appendValue('9')">9</button>
<button class="operator" onclick="appendValue('-')">-</button>

<button onclick="appendValue('4')">4</button>
<button onclick="appendValue('5')">5</button>
<button onclick="appendValue('6')">6</button>
<button class="operator" onclick="appendValue('+')">+</button>

<button onclick="appendValue('1')">1</button>
<button onclick="appendValue('2')">2</button>
<button onclick="appendValue('3')">3</button>
<button class="operator" onclick="appendValue('%')">%</button>

<button onclick="appendValue('0')">0</button>
<button onclick="appendValue('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>

</div>

<script>

let display = document.getElementById("display");

function appendValue(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function deleteLast(){
    display.value = display.value.slice(0,-1);
}

function calculate(){
    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }
}

</script>

</body>
</html>
